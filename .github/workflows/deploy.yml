name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        env:
          VITE_API_URL: https://script.google.com/macros/s/AKfycbxlze9yA7poPB5MSh8XUIcohcT0oUnNOmjZ7Bpln7ptJX0EJA8rQtCzwzR-UKlq6Qsjaw/exec
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages
